<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LESCO Pro | Elite Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #020617; --card: rgba(30, 41, 59, 0.4); --text: #f8fafc; }
        .light-mode { --bg: #f1f5f9; --card: rgba(255, 255, 255, 0.8); --text: #0f172a; }
        
        body { background: var(--bg); color: var(--text); transition: all 0.3s ease; font-family: 'Inter', sans-serif; }
        .glass { background: var(--card); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .tab-active { border-bottom: 3px solid #22c55e; color: #22c55e; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4">

    <button onclick="toggleTheme()" class="fixed top-6 right-6 glass p-3 rounded-full text-xl">🌓</button>

    <div class="max-w-md w-full">
        <div class="text-center mb-10">
            <h1 class="text-5xl font-black italic tracking-tighter">LESCO<span class="text-green-500">PRO</span></h1>
            <p class="text-[10px] opacity-50 font-bold uppercase tracking-[0.4em] mt-2">March 2026 Live Updates</p>
        </div>

        <div class="flex justify-around mb-8 border-b border-white/5">
            <button onclick="switchTab('check')" id="tabCheck" class="tab-active pb-3 font-black text-xs uppercase tracking-widest">Bill Checker</button>
            <button onclick="switchTab('calc')" id="tabCalc" class="pb-3 font-black text-xs uppercase tracking-widest opacity-50">Tax Estimator</button>
        </div>

        <div id="sectionCheck" class="animate-in fade-in slide-in-from-bottom-4">
            <div class="glass p-8 rounded-[2.5rem] shadow-2xl">
                <input type="text" id="refID" placeholder="14-Digit Reference" 
                       class="w-full bg-black/20 border border-white/10 p-5 rounded-2xl text-2xl font-mono focus:border-green-500 outline-none mb-4">
                <button onclick="smartFetch()" class="w-full bg-green-600 hover:bg-green-500 text-black font-black py-5 rounded-2xl transition-all shadow-lg shadow-green-500/20">FETCH LIVE BILL</button>
            </div>
            </div>

        <div id="sectionCalc" class="hidden animate-in fade-in slide-in-from-bottom-4">
            <div class="glass p-8 rounded-[2.5rem] space-y-6">
                <div>
                    <label class="text-[10px] font-bold text-green-500 uppercase tracking-widest ml-1">Units (e.g., 300)</label>
                    <input type="number" id="unitInput" placeholder="000" 
                           class="w-full bg-black/20 border border-white/10 p-5 rounded-2xl text-4xl font-black focus:border-green-500 outline-none">
                </div>
                <button onclick="calculateMarch2026()" class="w-full bg-white text-black font-black py-5 rounded-2xl uppercase text-xs tracking-tighter hover:bg-green-500 transition-all">Calculate 2026 Taxes</button>
            </div>

            <div id="calcDisplay" class="hidden mt-6 glass p-8 rounded-[2.5rem] space-y-4 border-l-4 border-green-500">
                <div class="flex justify-between text-sm opacity-70"><span>Variable Charges:</span><span id="vCharge">Rs. 0</span></div>
                <div class="flex justify-between text-sm opacity-70"><span>F.C. Surcharge (Rs. 3.23/u):</span><span id="fCharge">Rs. 0</span></div>
                <div class="flex justify-between text-sm opacity-70"><span>GST (18%):</span><span id="gCharge">Rs. 0</span></div>
                <div class="flex justify-between text-sm opacity-70"><span>Elec. Duty (1.5%):</span><span id="eDuty">Rs. 0</span></div>
                <div class="flex justify-between text-sm opacity-70"><span>TV Fee:</span><span>Rs. 35</span></div>
                <div class="pt-4 border-t border-white/10 flex justify-between items-center">
                    <span class="font-bold text-lg">Total Estimate:</span>
                    <span id="tCharge" class="text-3xl font-black text-green-500">Rs. 0</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
        }

        function switchTab(tab) {
            const check = document.getElementById('sectionCheck');
            const calc = document.getElementById('sectionCalc');
            const tCheck = document.getElementById('tabCheck');
            const tCalc = document.getElementById('tabCalc');

            if(tab === 'calc') {
                check.classList.add('hidden'); calc.classList.remove('hidden');
                tCalc.classList.add('tab-active'); tCalc.classList.remove('opacity-50');
                tCheck.classList.remove('tab-active'); tCheck.classList.add('opacity-50');
            } else {
                calc.classList.add('hidden'); check.classList.remove('hidden');
                tCheck.classList.add('tab-active'); tCheck.classList.remove('opacity-50');
                tCalc.classList.remove('tab-active'); tCalc.classList.add('opacity-50');
            }
        }

        function calculateMarch2026() {
            const units = parseInt(document.getElementById('unitInput').value);
            if(!units || units < 0) return;

            // Updated March 2026 Slabs (Average Residential)
            let perUnitRate = 0;
            if (units <= 100) perUnitRate = 16.48;
            else if (units <= 200) perUnitRate = 22.95;
            else if (units <= 300) perUnitRate = 34.26;
            else perUnitRate = 48.12;

            const variableCharges = units * perUnitRate;
            const fcSurcharge = units * 3.23;
            const elecDuty = variableCharges * 0.015;
            const gst = (variableCharges + fcSurcharge + elecDuty) * 0.18;
            const tvFee = 35;
            const grandTotal = variableCharges + fcSurcharge + elecDuty + gst + tvFee;

            document.getElementById('vCharge').innerText = "Rs. " + variableCharges.toFixed(0);
            document.getElementById('fCharge').innerText = "Rs. " + fcSurcharge.toFixed(0);
            document.getElementById('eDuty').innerText = "Rs. " + elecDuty.toFixed(0);
            document.getElementById('gCharge').innerText = "Rs. " + gst.toFixed(0);
            document.getElementById('tCharge').innerText = "Rs. " + Math.round(grandTotal).toLocaleString();
            
            document.getElementById('calcDisplay').classList.remove('hidden');
        }
    </script>
</body>
</html>
