<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PakBill Live | Real-Time Fetcher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap');
        body { background: #070a13; color: #fff; font-family: 'Space Grotesk', sans-serif; }
        .data-row { border-bottom: 1px solid rgba(255,255,255,0.05); padding: 12px 0; }
        .loader { border-top-color: #22c55e; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-10 flex flex-col items-center">

    <div class="max-w-2xl w-full">
        <h1 class="text-4xl font-bold text-center mb-2 text-green-500">Bill<span class="text-white">Live</span></h1>
        <p class="text-center text-gray-500 text-sm mb-8 uppercase tracking-widest font-bold">Live Data Extraction Engine</p>

        <div class="bg-slate-900/50 p-6 rounded-3xl border border-white/10 shadow-2xl">
            <div class="flex flex-col md:flex-row gap-3">
                <input type="text" id="refID" placeholder="Enter 14-Digit Ref No." 
                       class="flex-1 bg-black/40 border border-white/10 p-4 rounded-xl text-xl outline-none focus:border-green-500 transition-all">
                <button onclick="fetchBillData()" class="bg-green-600 hover:bg-green-500 text-black font-bold px-8 py-4 rounded-xl transition-all">
                    FETCH DATA
                </button>
            </div>

            <div id="loading" class="hidden mt-10 flex justify-center">
                <div class="loader w-10 h-10 border-4 border-white/10 rounded-full"></div>
            </div>

            <div id="billDisplay" class="hidden mt-8 space-y-2 animate-in fade-in duration-500">
                <div class="bg-green-500/10 p-4 rounded-2xl mb-6 flex justify-between items-center border border-green-500/20">
                    <span class="text-xs font-bold uppercase text-green-400 tracking-tighter">Current Month Status</span>
                    <span id="statusLabel" class="text-xs bg-green-500 text-black px-2 py-1 rounded font-bold">UNPAID</span>
                </div>

                <div class="data-row flex justify-between">
                    <span class="text-gray-500">Consumer Name:</span>
                    <span id="resName" class="font-bold">---</span>
                </div>
                <div class="data-row flex justify-between">
                    <span class="text-gray-500">Billing Month:</span>
                    <span id="resMonth" class="font-bold">---</span>
                </div>
                <div class="data-row flex justify-between">
                    <span class="text-gray-500">Units Consumed:</span>
                    <span id="resUnits" class="font-bold">---</span>
                </div>
                <div class="data-row flex justify-between border-b-0">
                    <span class="text-gray-500 font-bold text-white text-lg">Total Payable:</span>
                    <span id="resTotal" class="font-bold text-2xl text-green-500">Rs. 0</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function fetchBillData() {
            const ref = document.getElementById('refID').value.trim();
            const loading = document.getElementById('loading');
            const display = document.getElementById('billDisplay');

            if (ref.length < 10) {
                alert("Please enter a full Reference Number.");
                return;
            }

            // Show loader, hide display
            loading.classList.remove('hidden');
            display.classList.add('hidden');

            try {
                /* TECHNICAL NOTE FOR 2026: 
                   We are using a CORS proxy (allOrigins) to fetch the raw HTML 
                   from the official LESCO portal and then 'scrape' the data.
                */
                const targetUrl = `https://lescoebil.pk/check-bill?ref=${ref}`;
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;

                const response = await fetch(proxyUrl);
                const data = await response.json();
                
                // This converts the string back into HTML so we can read it
                const parser = new DOMParser();
                const doc = parser.parseFromString(data.contents, 'text/html');

                // EXTRACTION LOGIC (Example selectors - these change based on site structure)
                // In a real project, you would inspect the LESCO page to find the exact IDs
                document.getElementById('resName').innerText = "M. AHMED (Example)"; 
                document.getElementById('resMonth').innerText = "MARCH 2026";
                document.getElementById('resUnits').innerText = "342 Units";
                document.getElementById('resTotal').innerText = "Rs. 18,450";

                loading.classList.add('hidden');
                display.classList.remove('hidden');

            } catch (error) {
                console.error(error);
                alert("Error fetching data. The government server might be down.");
                loading.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
