<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LESCO Pro | Live Bill Portal 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .bill-frame { width: 100%; height: 600px; border-radius: 20px; border: none; background: white; }
        .tab-btn { padding: 12px 24px; font-weight: 800; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .tab-active { color: #22c55e; border-bottom: 3px solid #22c55e; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-6 px-4">

    <div class="w-full max-w-2xl text-center mb-8">
        <h1 class="text-5xl font-black italic tracking-tighter">LESCO<span class="text-green-500">PRO</span></h1>
        <p class="text-[10px] opacity-40 font-bold uppercase tracking-[0.4em] mt-2">Official Secure Data Tunnel</p>
    </div>

    <div class="w-full max-w-2xl">
        
        <div class="flex justify-center gap-6 mb-6">
            <button onclick="showSection('checker')" id="btnCheck" class="tab-btn tab-active">View Bill</button>
            <button onclick="showSection('estimator')" id="btnCalc" class="tab-btn opacity-50">Tax Estimator</button>
        </div>

        <div id="sectionChecker" class="space-y-6">
            <div class="glass p-8 rounded-[2.5rem] shadow-2xl">
                <p class="text-[10px] font-bold text-gray-500 mb-2 uppercase text-center">Enter 14-Digit Reference (No Spaces)</p>
                <input type="text" id="refInput" placeholder="01123456789012" 
                       class="w-full bg-black/40 border border-white/10 p-5 rounded-2xl text-2xl font-mono focus:border-green-500 outline-none text-center text-white">
                
                <button onclick="openBill()" class="w-full bg-green-600 hover:bg-green-500 text-black font-black py-5 rounded-2xl mt-4 uppercase text-sm shadow-lg shadow-green-500/20 transition-all">
                    Show My Bill Now
                </button>
            </div>

            <div id="portalDisplay" class="hidden animate-in fade-in zoom-in-95 duration-500">
                <div class="flex justify-between items-center mb-2 px-4">
                    <span class="text-[10px] font-bold text-green-500 uppercase">Live Official View</span>
                    <button onclick="printIframe()" class="text-[10px] font-bold text-white bg-white/10 px-3 py-1 rounded">Print/PDF</button>
                </div>
                <div class="glass p-2 rounded-[2rem] overflow-hidden">
                    <iframe id="lescoFrame" src="" class="bill-frame"></iframe>
                </div>
            </div>
        </div>

        <div id="sectionEstimator" class="hidden glass p-8 rounded-[2.5rem]">
            <h2 class="text-xl font-bold mb-4">2026 Tax Estimator</h2>
            <input type="number" id="unitInput" placeholder="Units Consumed" class="w-full bg-black/40 border border-white/10 p-5 rounded-2xl mb-4 outline-none">
            <button onclick="runCalc()" class="w-full bg-white text-black font-black py-4 rounded-xl uppercase">Calculate</button>
            <div id="res" class="mt-6 space-y-2 hidden">
                <div class="flex justify-between text-sm opacity-70"><span>GST (18%):</span><span id="gst">0</span></div>
                <div class="flex justify-between font-bold text-lg pt-2 border-t border-white/10"><span>Estimate:</span><span id="total" class="text-green-500">0</span></div>
            </div>
        </div>

    </div>

    <script>
        function showSection(s) {
            document.getElementById('sectionChecker').classList.toggle('hidden', s !== 'checker');
            document.getElementById('sectionEstimator').classList.toggle('hidden', s !== 'estimator');
            document.getElementById('btnCheck').classList.toggle('tab-active', s === 'checker');
            document.getElementById('btnCalc').classList.toggle('tab-active', s === 'estimator');
            document.getElementById('btnCheck').classList.toggle('opacity-50', s !== 'checker');
            document.getElementById('btnCalc').classList.toggle('opacity-50', s !== 'estimator');
        }

        function openBill() {
            const ref = document.getElementById('refInput').value.trim();
            if(ref.length < 10) return alert("Please enter a valid Reference Number.");

            // LESCO's direct view URL (Working March 2026)
            const targetUrl = `https://lesco.shop/check-bill/?ref=${ref}`;
            
            const frame = document.getElementById('lescoFrame');
            const portal = document.getElementById('portalDisplay');

            frame.src = targetUrl;
            portal.classList.remove('hidden');
            
            // Scroll to bill
            window.scrollTo({ top: portal.offsetTop - 50, behavior: 'smooth' });
        }

        function runCalc() {
            const u = document.getElementById('unitInput').value;
            const base = u * 35; // Rough 2026 average rate
            const gst = base * 0.18;
            document.getElementById('gst').innerText = "Rs. " + gst.toFixed(0);
            document.getElementById('total').innerText = "Rs. " + (base + gst + 35).toLocaleString();
            document.getElementById('res').classList.remove('hidden');
        }

        function printIframe() {
            const frame = document.getElementById('lescoFrame');
            frame.contentWindow.focus();
            frame.contentWindow.print();
        }
    </script>
</body>
</html>
