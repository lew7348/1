<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PakPrice | Live Daily Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        body { background: #0f172a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-4xl mx-auto">
        
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black text-green-500 tracking-tighter">PAK<span class="text-white">PRICE</span></h1>
            <p class="text-gray-400 text-sm mt-2">Live Automated Market Tracker — March 2026</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="glass p-6 rounded-3xl">
                <div class="flex justify-between items-start mb-4">
                    <span class="text-xs font-bold text-gray-500 uppercase">Petrol (Super)</span>
                    <span class="bg-red-500/20 text-red-400 text-[10px] px-2 py-1 rounded">▲ UP</span>
                </div>
                <div class="text-3xl font-black">Rs. 266.17</div>
                <div class="text-[10px] text-gray-500 mt-2 italic text-right italic">Updated: Mar 1</div>
            </div>

            <div class="glass p-6 rounded-3xl">
                <div class="flex justify-between items-start mb-4">
                    <span class="text-xs font-bold text-gray-500 uppercase">Diesel (HSD)</span>
                    <span class="bg-red-500/20 text-red-400 text-[10px] px-2 py-1 rounded">▲ UP</span>
                </div>
                <div class="text-3xl font-black">Rs. 280.86</div>
                <div class="text-[10px] text-gray-500 mt-2 text-right italic">Updated: Mar 1</div>
            </div>

            <div class="glass p-6 rounded-3xl">
                <div class="flex justify-between items-start mb-4">
                    <span class="text-xs font-bold text-gray-500 uppercase">Gold (24K/Tola)</span>
                    <span class="bg-green-500/20 text-green-400 text-[10px] px-2 py-1 rounded">▼ DOWN</span>
                </div>
                <div id="gold-val" class="text-3xl font-black">Rs. 539,962</div>
                <div class="text-[10px] text-gray-500 mt-2 text-right italic">Updated: Mar 4</div>
            </div>
        </div>

        <div class="glass p-8 rounded-[2rem] border-green-500/20 border-2">
            <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                ⚡ Electricity Bill Estimator (2026 Rates)
            </h2>
            <div class="space-y-4">
                <label class="block text-sm text-gray-400">Enter Monthly Units Consumed:</label>
                <input type="number" id="units" placeholder="e.g. 350" class="w-full bg-black/40 border border-white/10 p-4 rounded-xl text-xl outline-none focus:border-green-500">
                
                <button onclick="calculateBill()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl transition-all">CALCULATE ESTIMATE</button>
                
                <div id="bill-result" class="hidden mt-6 p-6 bg-white/5 rounded-2xl border-l-4 border-green-500">
                    <div class="flex justify-between items-center text-sm mb-2">
                        <span>Estimated Total Bill:</span>
                        <span id="final-amount" class="text-2xl font-black text-green-400">Rs. 0</span>
