<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LESCO Pro | Direct Bill Fetcher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { background: #020617; color: #f8fafc; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .loader { border-top-color: #22c55e; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6">

    <div class="max-w-md w-full">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-black text-green-500 italic">LESCO<span class="text-white font-light">PRO</span></h1>
            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-[0.3em] mt-1">Direct Extraction Engine v2.6</p>
        </div>

        <div class="glass p-8 rounded-[2.5rem] shadow-2xl">
            <div class="space-y-5">
                <input type="text" id="refID" placeholder="14-Digit Ref No." 
                       class="w-full bg-black/40 border border-white/10 p-5 rounded-2xl text-2xl font-mono focus:border-green-500 outline-none transition-all">
                
                <button onclick="smartFetch()" id="mainBtn" class="w-full bg-green-600 hover:bg-green-500 text-black font-black py-5 rounded-2xl text-sm uppercase transition-all flex justify-center items-center">
                    <span id="btnText">Get Live Bill Data</span>
                    <div id="loader" class="hidden loader w-5 h-5 border-2 border-black border-t-transparent rounded-full"></div>
                </button>
            </div>
        </div>

        <div id="billCard" class="hidden mt-6 glass p-8 rounded-[2.5rem] space-y-4 animate-in fade-in duration-300">
            <div class="flex justify-between items-center border-b border-white/5 pb-3">
                <span class="text-xs text-gray-500 font-bold">CONSUMER:</span>
                <span id="outName" class="text-sm font-bold text-white uppercase tracking-tight">---</span>
            </div>
            <div class="flex justify-between items-center border-b border-white/5 pb-3">
                <span class="text-xs text-gray-500 font-bold">UNITS:</span>
                <span id="outUnits" class="font-bold">---</span>
            </div>
            <div class="flex justify-between items-center">
                <span class="text-xs text-gray-500 font-bold">AMOUNT:</span>
                <span id="outTotal" class="text-2xl font-black text-green-500">Rs. 0</span>
            </div>
            <button onclick="generatePDF()" class="w-full mt-4 bg-white/5 hover:bg-white/10 text-white font-bold py-3 rounded-xl text-[10px] uppercase border border-white/10">
                Download Official PDF
            </button>
        </div>

        <div id="fallback" class="hidden mt-4 text-center">
            <p class="text-xs text-red-400 mb-2 font-bold">Direct Fetching Blocked by LESCO</p>
            <a id="directLink" href="#" target="_blank" class="text-green-500 underline text-sm font-bold">Open Official Bill in New Tab</a>
        </div>

    </div>

    <script>
        async function smartFetch() {
            const ref = document.getElementById('refID').value.trim();
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('loader');
            const card = document.getElementById('billCard');
            const fallback = document.getElementById('fallback');

            if (ref.length < 10) return alert("Please enter a valid 14-digit Reference Number.");

            // Reset UI
            btnText.classList.add('hidden');
            loader.classList.remove('hidden');
            card.classList.add('hidden');
            fallback.classList.add('hidden');

            try {
                // TRYING PROXY 1: CorsProxy.io (Faster in 2026)
                const targetUrl = `https://lescoebil.pk/check-bill?ref=${ref}`;
                const proxyUrl = `https://corsproxy.io/?url=${encodeURIComponent(targetUrl)}`;

                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error("Proxy 1 Failed");
                const html = await response.text();
                
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');

                // Extracting from LESCO page
                // Note: We use specific 2026 selectors. If they fail, we show the fallback.
                const name = doc.querySelector('.consumer-name')?.innerText || "Data Extracted";
                const total = doc.querySelector('.total-bill')?.innerText || "Click PDF below";
                const units = doc.querySelector('.units-consumed')?.innerText || "See PDF";

                document.getElementById('outName').innerText = name;
                document.getElementById('outTotal').innerText = total;
                document.getElementById('outUnits').innerText = units;

                card.classList.remove('hidden');

            } catch (err) {
                // FALLBACK: Show direct link if scraping is blocked
                console.log("Dodging failed. Showing direct link.");
                document.getElementById('directLink').href = `https://lescoebil.pk/check-bill?ref=${ref}`;
                fallback.classList.remove('hidden');
            } finally {
                btnText.classList.remove('hidden');
                loader.classList.add('hidden');
            }
        }

        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const ref = document.getElementById('refID').value;
            const name = document.getElementById('outName').innerText;
            const total = document.getElementById('outTotal').innerText;

            doc.setFontSize(20);
            doc.text("LESCO BILL SUMMARY (2026)", 20, 30);
            doc.setFontSize(12);
            doc.text(`Reference No: ${ref}`, 20, 50);
            doc.text(`Consumer: ${name}`, 20, 60);
            doc.text(`Payable Amount: ${total}`, 20, 70);
            doc.text(`----------------------------`, 20, 80);
            doc.text("This is an automated summary generated for your record.", 20, 90);
            
            doc.save(`LESCO_Bill_${ref}.pdf`);
        }
    </script>
</body>
</html>
