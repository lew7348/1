<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LESCO Pro | Official Billing Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* The Secret Window */
        #billWindow {
            width: 100%;
            height: 85vh;
            border-radius: 24px;
            border: 2px solid rgba(34, 197, 94, 0.3);
            background: white; /* Most gov bills have white backgrounds */
            display: none;
            margin-top: 2rem;
        }

        .spinner { border-top-color: #22c55e; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4">

    <div id="mainUI" class="max-w-2xl w-full transition-all duration-500">
        <div class="text-center mb-8">
            <h1 class="text-5xl font-black italic tracking-tighter">LESCO<span class="text-green-500">PRO</span></h1>
            <p class="text-[10px] opacity-40 font-bold uppercase tracking-[0.4em] mt-2">March 2026 Direct Database Access</p>
        </div>

        <div class="glass p-8 rounded-[2.5rem] shadow-2xl relative z-10">
            <div class="flex justify-center gap-4 mb-6">
                <button onclick="setMode('N')" id="modeN" class="text-[10px] font-black uppercase tracking-widest px-4 py-2 rounded-full bg-green-500 text-black">Reference No</button>
                <button onclick="setMode('Y')" id="modeY" class="text-[10px] font-black uppercase tracking-widest px-4 py-2 rounded-full bg-white/5 opacity-50">Customer ID</button>
            </div>

            <form action="https://www.lesco.gov.pk:36269/Modules/CustomerBillN/CheckBill.asp" method="get" target="billFrame" onsubmit="handleShow()">
                <input type="text" name="refrnce" id="userInput" placeholder="14-Digit Ref No." 
                       class="w-full bg-black/40 border border-white/10 p-6 rounded-2xl text-3xl font-mono text-center outline-none focus:border-green-500 transition-all mb-4 text-white">
                
                <input type="hidden" name="IsCust" id="isCust" value="N">

                <button type="submit" class="w-full bg-green-600 hover:bg-green-500 text-black font-black py-5 rounded-2xl uppercase text-xs tracking-widest shadow-lg shadow-green-500/20 active:scale-95 transition-all">
                    Generate Live Bill
                </button>
            </form>
        </div>

        <div id="loader" class="hidden mt-10 flex flex-col items-center">
            <div class="spinner w-10 h-10 border-4 border-white/10 rounded-full mb-4"></div>
            <p class="text-xs font-bold text-green-500 uppercase tracking-widest">Connecting to Port 36269...</p>
        </div>
    </div>

    <div id="windowWrapper" class="max-w-5xl w-full hidden animate-in fade-in slide-in-from-bottom-10 duration-700">
        <div class="flex justify-between items-center mb-4 px-4">
            <button onclick="closeWindow()" class="text-xs font-bold text-gray-400 hover:text-white transition-all uppercase">← Back to Dashboard</button>
            <div class="flex gap-2">
                <span class="w-3 h-3 rounded-full bg-red-500"></span>
                <span class="w-3 h-3 rounded-full bg-yellow-500"></span>
                <span class="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
        </div>
        <iframe name="billFrame" id="billWindow"></iframe>
    </div>

    <script>
        function setMode(val) {
            document.getElementById('isCust').value = val;
            const btnN = document.getElementById('modeN');
            const btnY = document.getElementById('modeY');
            const input = document.getElementById('userInput');

            if(val === 'N') {
                btnN.className = "text-[10px] font-black uppercase tracking-widest px-4 py-2 rounded-full bg-green-500 text-black";
                btnY.className = "text-[10px] font-black uppercase tracking-widest px-4 py-2 rounded-full bg-white/5 opacity-50";
                input.placeholder = "14-Digit Ref No.";
            } else {
                btnY.className = "text-[10px] font-black uppercase tracking-widest px-4 py-2 rounded-full bg-green-500 text-black";
                btnN.className = "text-[10px] font-black uppercase tracking-widest px-4 py-2 rounded-full bg-white/5 opacity-50";
                input.placeholder = "7-Digit Cust ID";
            }
        }

        function handleShow() {
            // Hide the main UI slightly and show loader
            document.getElementById('mainUI').style.opacity = "0.3";
            document.getElementById('loader').classList.remove('hidden');
            
            // Wait for LESCO server to respond, then show window
            setTimeout(() => {
                document.getElementById('mainUI').classList.add('hidden');
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('windowWrapper').classList.remove('hidden');
                document.getElementById('billWindow').style.display = "block";
            }, 1500);
        }

        function closeWindow() {
            document.getElementById('windowWrapper').classList.add('hidden');
            document.getElementById('mainUI').classList.remove('hidden');
            document.getElementById('mainUI').style.opacity = "1";
            document.getElementById('billWindow').src = "about:blank";
        }
    </script>
</body>
</html>
